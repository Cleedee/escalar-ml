<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="dotGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shield/pitch -->
  <path d="M256 60 L420 140 L420 310 Q420 430 256 470 Q92 430 92 310 L92 140 Z"
        fill="url(#pitch)" filter="url(#shadow)"/>

  <!-- Field markings -->
  <path d="M256 92 L392 158 L392 302 Q392 400 256 435 Q120 400 120 302 L120 158 Z"
        fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2.5"/>
  <line x1="256" y1="92" x2="256" y2="435" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/>
  <circle cx="256" cy="263" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2.5"/>

  <!-- 4-3-3 formation -->
  <g filter="url(#dotGlow)">
    <circle cx="256" cy="400" r="10" fill="#fff"/>
  </g>
  <circle cx="170" cy="330" r="10" fill="#fff"/>
  <circle cx="220" cy="325" r="10" fill="#fff"/>
  <circle cx="292" cy="325" r="10" fill="#fff"/>
  <circle cx="342" cy="330" r="10" fill="#fff"/>
  <circle cx="195" cy="245" r="10" fill="#fff"/>
  <circle cx="256" cy="235" r="13" fill="#f97316" filter="url(#dotGlow)"/>
  <circle cx="317" cy="245" r="10" fill="#fff"/>
  <circle cx="195" cy="155" r="10" fill="#fff"/>
  <circle cx="256" cy="140" r="10" fill="#fff"/>
  <circle cx="317" cy="155" r="10" fill="#fff"/>

  <!-- Edges -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none">
    <line x1="256" y1="400" x2="256" y2="325"/>
    <line x1="256" y1="325" x2="256" y2="235"/>
    <line x1="195" y1="245" x2="195" y2="155"/>
    <line x1="317" y1="245" x2="317" y2="155"/>
    <line x1="220" y1="325" x2="195" y2="245"/>
    <line x1="292" y1="325" x2="317" y2="245"/>
    <line x1="170" y1="330" x2="195" y2="245"/>
    <line x1="342" y1="330" x2="317" y2="245"/>
    <line x1="195" y1="245" x2="256" y2="235"/>
    <line x1="317" y1="245" x2="256" y2="235"/>
    <line x1="256" y1="235" x2="256" y2="140"/>
    <line x1="220" y1="325" x2="292" y2="325"/>
  </g>

  <!-- ML/tech accent lines (dashed, glowing) -->
  <path d="M140 220 Q190 185 195 155"
        fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-dasharray="5 5" opacity="0.5"/>
  <path d="M372 220 Q322 185 317 155"
        fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-dasharray="5 5" opacity="0.5"/>
</svg>
